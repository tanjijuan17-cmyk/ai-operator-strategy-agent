            -产品品类：{{#1778162805137.structured_output.product#}}

            -触达渠道：{{#1778162805137.structured_output.channel#}}


            字段值为 "unknown" 代表当前缺失


            ## 任务

            请优先补充生成运营方案所需的关键信息。

            1. 优先追问：

            - 运营目标

            - 目标人群

            - 运营场景


            2. 次级补充信息：

            - 时间节点

