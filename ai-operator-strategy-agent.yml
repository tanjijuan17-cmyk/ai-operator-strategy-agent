    - data:
        code: "def main(\n    can_generate_input: bool,\n    business_goal: str,\n\
          \    target_user: str,\n    scenario: str,\n    channel: str,\n    product:\
          \ str,\n    budget: str,\n    time_window: str,\n    search_keywords\n)\
          \ -> dict:\n\n    \"\"\"\n    1. 透传 can_generate 给条件分支\n    2. 构建适合知识检索的\
          \ retrieval_query\n    \"\"\"\n\n    result = bool(can_generate_input)\n\
          \n    terms = []\n\n    def add(value):\n        if value is None:\n   \
          \         return\n\n        val = str(value).strip()\n\n        if val and\
          \ val.lower() != \"unknown\":\n            terms.append(val)\n\n    # 核心检索字段（高优先级）\n\
          \    add(business_goal)\n    add(target_user)\n    add(scenario)\n    add(product)\n\
          \    add(channel)\n\n    # search_keywords\n    if isinstance(search_keywords,\
          \ list):\n        for item in search_keywords:\n            add(item)\n\
          \    else:\n        add(search_keywords)\n\n    # 轻量同义词扩展（只做检索增强）\n    synonym_map\
          \ = {\n        \"拉新\": [\"获客\", \"用户增长\"],\n        \"获客\": [\"拉新\", \"\
          用户增长\"],\n        \"促活\": [\"用户留存\"],\n        \"召回\": [\"用户召回\"],\n   \
          \     \"联名\": [\"IP联名\"],\n        \"新品\": [\"新品推广\"],\n        \"会员\":\
          \ [\"会员运营\"],\n        \"社群\": [\"私域运营\"],\n        \"小程序\": [\"小程序运营\"\
          ]\n    }\n\n    expanded_terms = []\n\n    for term in terms:\n        expanded_terms.append(term)\n\
          \n        if term in synonym_map:\n            expanded_terms.extend(synonym_map[term])\n\
          \n    # 去重\n    final_terms = []\n\n    seen = set()\n\n    for term in\
          \ expanded_terms:\n        clean_term = str(term).strip()\n\n        if\
          \ clean_term and clean_term not in seen:\n            final_terms.append(clean_term)\n\
          \            seen.add(clean_term)\n\n    # 控制长度\n    final_terms = final_terms[:12]\n\
          \n    retrieval_query = \" \".join(final_terms)\n\n    return {\n      \
          \  \"result\": result,\n        \"retrieval_query\": retrieval_query\n \
          \   }"
        code_language: python3
        desc: 接收需求解析节点输出的结构化数据，根据预设的同义词映射表进行检索词扩展与去重，生成优化后的知识检索查询语句（retrieval_query），同时透传can_generate判断结果至条件分支节点。
        outputs:
